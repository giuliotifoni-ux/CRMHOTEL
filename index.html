<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="HCS CRM">
  <meta name="theme-color" content="#ffffff">
  <title>HCS CRM</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #F5F7FA; --white: #FFFFFF; --gray-50: #F8FAFC; --gray-100: #F1F5F9; --gray-200: #E2E8F0;
      --gray-300: #CBD5E1; --gray-400: #94A3B8; --gray-500: #64748B; --gray-600: #475569; --gray-700: #334155; --gray-900: #0F172A;
      --blue-500: #3B82F6; --blue-100: #DBEAFE; --blue-600: #2563EB;
      --purple-500: #8B5CF6; --purple-100: #EDE9FE;
      --amber-500: #F59E0B; --amber-100: #FEF3C7;
      --pink-500: #EC4899; --pink-100: #FCE7F3;
      --emerald-500: #10B981; --emerald-100: #D1FAE5;
      --red-500: #EF4444; --red-100: #FEE2E2;
      --cyan-500: #06B6D4; --cyan-100: #CFFAFE;
      --radius: 16px; --radius-sm: 12px; --radius-xs: 8px;
      --shadow: 0 4px 20px rgba(0,0,0,0.08); --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
      --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body, #root { height: 100%; }
    body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--bg); color: var(--gray-900); }
    
    /* ============ LAYOUT ============ */
    .app { height: 100%; display: flex; flex-direction: column; }
    .app-desktop { display: flex; height: 100%; }
    .sidebar { width: 280px; background: var(--white); border-right: 1px solid var(--gray-200); display: flex; flex-direction: column; flex-shrink: 0; }
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    
    /* ============ SIDEBAR ============ */
    .sidebar-header { padding: 24px; border-bottom: 1px solid var(--gray-100); }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--blue-500), var(--purple-500)); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; font-weight: 800; }
    .logo h1 { font-size: 22px; font-weight: 800; }
    .logo h1 span { color: var(--blue-500); }
    
    .sidebar-nav { padding: 16px; flex: 1; }
    .nav-section { margin-bottom: 24px; }
    .nav-section-title { font-size: 11px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.5px; padding: 0 12px; margin-bottom: 8px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: var(--radius-sm); cursor: pointer; color: var(--gray-600); font-weight: 500; transition: all 0.15s; margin-bottom: 4px; }
    .nav-item:hover { background: var(--gray-50); color: var(--gray-900); }
    .nav-item.active { background: var(--blue-100); color: var(--blue-600); font-weight: 600; }
    .nav-icon { font-size: 20px; }
    .nav-badge { margin-left: auto; background: var(--gray-100); color: var(--gray-600); font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
    .nav-item.active .nav-badge { background: var(--blue-500); color: white; }
    
    .sidebar-footer { padding: 16px; border-top: 1px solid var(--gray-100); }
    .source-badge { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: var(--radius-xs); font-size: 13px; font-weight: 600; }
    .source-badge.ok { background: var(--emerald-100); color: var(--emerald-500); }
    .source-badge.error { background: var(--red-100); color: var(--red-500); }
    
    /* ============ HEADER ============ */
    .header { background: var(--white); padding: 20px 28px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; justify-content: space-between; gap: 20px; }
    .header-title { font-size: 24px; font-weight: 800; }
    .header-actions { display: flex; gap: 12px; }
    
    /* ============ STATS BAR ============ */
    .stats-bar { background: var(--white); padding: 16px 28px; border-bottom: 1px solid var(--gray-100); display: flex; gap: 16px; overflow-x: auto; }
    .stat-card { padding: 16px 20px; border-radius: var(--radius-sm); min-width: 120px; }
    .stat-card.blue { background: linear-gradient(135deg, #EFF6FF, #DBEAFE); }
    .stat-card.emerald { background: linear-gradient(135deg, #ECFDF5, #D1FAE5); }
    .stat-card.amber { background: linear-gradient(135deg, #FFFBEB, #FEF3C7); }
    .stat-card.red { background: linear-gradient(135deg, #FEF2F2, #FEE2E2); }
    .stat-card.purple { background: linear-gradient(135deg, #F5F3FF, #EDE9FE); }
    .stat-value { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
    .stat-card.blue .stat-value { color: var(--blue-600); }
    .stat-card.emerald .stat-value { color: var(--emerald-500); }
    .stat-card.amber .stat-value { color: var(--amber-500); }
    .stat-card.red .stat-value { color: var(--red-500); }
    .stat-card.purple .stat-value { color: var(--purple-500); }
    .stat-label { font-size: 12px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; }
    
    /* ============ VIEW TABS ============ */
    .view-tabs { display: flex; gap: 8px; background: var(--gray-100); padding: 6px; border-radius: var(--radius-sm); }
    .view-tab { padding: 10px 18px; border-radius: var(--radius-xs); font-size: 14px; font-weight: 600; cursor: pointer; color: var(--gray-500); transition: all 0.15s; display: flex; align-items: center; gap: 8px; }
    .view-tab:hover { color: var(--gray-700); }
    .view-tab.active { background: var(--white); color: var(--gray-900); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    
    /* ============ SEARCH ============ */
    .search-box { display: flex; align-items: center; background: var(--gray-50); border: 2px solid var(--gray-200); border-radius: var(--radius-sm); padding: 0 16px; flex: 1; max-width: 400px; transition: all 0.2s; }
    .search-box:focus-within { background: var(--white); border-color: var(--blue-500); }
    .search-box input { flex: 1; border: none; background: none; padding: 12px; font-size: 14px; outline: none; color: var(--gray-900); }
    .search-icon { color: var(--gray-400); }
    
    /* ============ CONTENT AREA ============ */
    .content-area { flex: 1; overflow: auto; padding: 24px 28px; }
    
    /* ============ KANBAN VIEW ============ */
    .kanban { display: flex; gap: 16px; height: 100%; overflow-x: auto; padding-bottom: 16px; }
    .kanban-col { width: 320px; flex-shrink: 0; background: var(--gray-50); border-radius: var(--radius); display: flex; flex-direction: column; max-height: 100%; }
    .kanban-header { padding: 16px; border-radius: var(--radius) var(--radius) 0 0; display: flex; align-items: center; justify-content: space-between; }
    .kanban-header.lead { background: linear-gradient(135deg, #DBEAFE, #BFDBFE); }
    .kanban-header.contattato { background: linear-gradient(135deg, #EDE9FE, #DDD6FE); }
    .kanban-header.demo { background: linear-gradient(135deg, #FEF3C7, #FDE68A); }
    .kanban-header.proposta { background: linear-gradient(135deg, #FCE7F3, #FBCFE8); }
    .kanban-header.chiuso { background: linear-gradient(135deg, #D1FAE5, #A7F3D0); }
    .kanban-header.perso { background: linear-gradient(135deg, #FEE2E2, #FECACA); }
    .kanban-title { font-weight: 700; font-size: 14px; color: var(--gray-900); }
    .kanban-count { font-size: 12px; font-weight: 700; padding: 4px 10px; background: rgba(255,255,255,0.8); border-radius: 20px; color: var(--gray-700); }
    .kanban-body { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    
    /* ============ HOTEL CARD ============ */
    .hotel-card { background: var(--white); border-radius: var(--radius-sm); padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid var(--gray-100); cursor: pointer; transition: all 0.2s; }
    .hotel-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); border-color: var(--gray-200); }
    .hotel-card:active { transform: scale(0.98); }
    .card-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
    .semaforo { width: 10px; height: 10px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
    .semaforo.verde { background: var(--emerald-500); box-shadow: 0 0 0 4px var(--emerald-100); }
    .semaforo.arancione { background: var(--amber-500); box-shadow: 0 0 0 4px var(--amber-100); }
    .semaforo.rosso { background: var(--red-500); box-shadow: 0 0 0 4px var(--red-100); }
    .card-info { flex: 1; min-width: 0; }
    .card-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
    .card-location { font-size: 13px; color: var(--gray-500); display: flex; align-items: center; gap: 4px; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
    .tag.stage { background: var(--blue-100); color: var(--blue-600); }
    .tag.valore { background: var(--emerald-100); color: var(--emerald-500); }
    .tag.dist { background: var(--gray-100); color: var(--gray-600); }
    .tag.date { background: var(--cyan-100); color: var(--cyan-500); }
    
    /* ============ LIST VIEW ============ */
    .list-view { display: flex; flex-direction: column; gap: 12px; }
    .list-card { display: flex; align-items: center; background: var(--white); border-radius: var(--radius-sm); padding: 16px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid var(--gray-100); cursor: pointer; transition: all 0.15s; gap: 16px; }
    .list-card:hover { box-shadow: var(--shadow); border-color: var(--blue-200); }
    .list-card-info { flex: 1; min-width: 0; }
    .list-card-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .list-card-meta { font-size: 13px; color: var(--gray-500); }
    .list-card-actions { display: flex; gap: 8px; }
    
    /* ============ MAP VIEW ============ */
    .map-container { height: 100%; border-radius: var(--radius); overflow: hidden; background: var(--gray-100); position: relative; }
    .map-placeholder { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
    .map-placeholder-icon { font-size: 64px; margin-bottom: 16px; }
    .map-placeholder h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .map-placeholder p { color: var(--gray-500); margin-bottom: 20px; }
    
    /* ============ BUTTONS ============ */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: var(--blue-500); color: white; }
    .btn-primary:hover { background: var(--blue-600); }
    .btn-secondary { background: var(--gray-100); color: var(--gray-700); }
    .btn-secondary:hover { background: var(--gray-200); }
    .btn-success { background: var(--emerald-500); color: white; }
    .btn-icon { width: 40px; height: 40px; padding: 0; border-radius: 50%; }
    
    /* ============ MODAL ============ */
    .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { width: 100%; max-width: 560px; max-height: 90vh; background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-lg); display: flex; flex-direction: column; overflow: hidden; }
    .modal-header { padding: 24px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: flex-start; justify-content: space-between; }
    .modal-title { font-size: 20px; font-weight: 800; }
    .modal-subtitle { font-size: 14px; color: var(--gray-500); margin-top: 4px; }
    .modal-close { width: 36px; height: 36px; border-radius: 50%; background: var(--gray-100); border: none; cursor: pointer; font-size: 18px; color: var(--gray-600); display: flex; align-items: center; justify-content: center; }
    .modal-close:hover { background: var(--gray-200); }
    .modal-body { flex: 1; overflow-y: auto; padding: 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--gray-100); display: flex; justify-content: flex-end; gap: 12px; }
    
    .quick-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px; }
    .quick-action { padding: 16px 12px; background: var(--gray-50); border-radius: var(--radius-sm); display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
    .quick-action:hover { background: var(--gray-100); }
    .quick-action:active { transform: scale(0.96); }
    .quick-action-icon { font-size: 24px; }
    .quick-action-label { font-size: 11px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; }
    
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 12px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; margin-bottom: 8px; }
    .form-input { width: 100%; padding: 14px 16px; background: var(--gray-50); border: 2px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 15px; color: var(--gray-900); outline: none; transition: all 0.2s; }
    .form-input:focus { background: var(--white); border-color: var(--blue-500); }
    textarea.form-input { min-height: 100px; resize: vertical; }
    
    .stage-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stage-opt { padding: 14px; border-radius: var(--radius-sm); background: var(--gray-50); text-align: center; cursor: pointer; font-size: 13px; font-weight: 600; border: 2px solid transparent; transition: all 0.15s; }
    .stage-opt:hover { background: var(--gray-100); }
    .stage-opt.active { border-color: var(--blue-500); background: var(--blue-100); color: var(--blue-600); }
    
    .nearby-section { margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--gray-100); }
    .nearby-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .nearby-list { display: flex; flex-direction: column; gap: 8px; }
    .nearby-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--gray-50); border-radius: var(--radius-sm); cursor: pointer; }
    .nearby-item:hover { background: var(--gray-100); }
    .nearby-dist { font-size: 13px; font-weight: 700; color: var(--blue-500); min-width: 60px; }
    .nearby-name { flex: 1; font-size: 14px; font-weight: 500; }
    .nearby-arrow { color: var(--gray-400); }
    
    /* ============ ARCHIVE PAGE ============ */
    .archive-search { margin-bottom: 20px; }
    .archive-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }
    .archive-card { display: flex; align-items: center; background: var(--white); border-radius: var(--radius-sm); padding: 16px 20px; border: 1px solid var(--gray-100); gap: 16px; }
    .archive-card:hover { border-color: var(--blue-300); box-shadow: 0 4px 12px rgba(59,130,246,0.1); }
    .archive-info { flex: 1; }
    .archive-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .archive-meta { font-size: 13px; color: var(--gray-500); }
    
    /* ============ EMPTY STATE ============ */
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.5; }
    .empty-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .empty-text { color: var(--gray-500); margin-bottom: 24px; }
    
    /* ============ MOBILE STYLES ============ */
    @media (max-width: 900px) {
      .app-desktop { display: none; }
      .app-mobile { display: flex; flex-direction: column; height: 100%; }
      
      .mobile-header { background: var(--white); padding: 16px 20px; padding-top: calc(16px + var(--safe-top)); border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
      .mobile-header-title { font-size: 20px; font-weight: 800; }
      .mobile-header-back { width: 40px; height: 40px; border-radius: 50%; background: var(--gray-100); border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
      
      .mobile-content { flex: 1; overflow-y: auto; padding: 16px 20px; padding-bottom: calc(90px + var(--safe-bottom)); }
      
      .mobile-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); border-top: 1px solid var(--gray-100); padding: 8px 16px; padding-bottom: calc(8px + var(--safe-bottom)); display: flex; justify-content: space-around; z-index: 100; }
      .mobile-nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 16px; cursor: pointer; color: var(--gray-400); }
      .mobile-nav-item.active { color: var(--blue-500); }
      .mobile-nav-icon { font-size: 24px; }
      .mobile-nav-label { font-size: 11px; font-weight: 700; }
      
      .mobile-banner { background: linear-gradient(135deg, var(--blue-500), var(--purple-500)); padding: 16px 20px; border-radius: var(--radius); margin-bottom: 20px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
      .mobile-banner:active { opacity: 0.9; }
      .banner-info { display: flex; align-items: center; gap: 12px; }
      .banner-icon { font-size: 28px; }
      .banner-text { font-size: 14px; font-weight: 600; }
      .banner-text strong { display: block; font-size: 16px; }
      .banner-arrow { font-size: 24px; opacity: 0.8; }
      
      .mobile-stats { display: flex; gap: 12px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; }
      .mobile-stat { flex-shrink: 0; padding: 14px 18px; border-radius: var(--radius-sm); min-width: 90px; text-align: center; }
      .mobile-stat.emerald { background: var(--emerald-100); }
      .mobile-stat.amber { background: var(--amber-100); }
      .mobile-stat.red { background: var(--red-100); }
      .mobile-stat.purple { background: var(--purple-100); }
      .mobile-stat-val { font-size: 22px; font-weight: 800; }
      .mobile-stat.emerald .mobile-stat-val { color: var(--emerald-500); }
      .mobile-stat.amber .mobile-stat-val { color: var(--amber-500); }
      .mobile-stat.red .mobile-stat-val { color: var(--red-500); }
      .mobile-stat.purple .mobile-stat-val { color: var(--purple-500); }
      .mobile-stat-label { font-size: 10px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; }
      
      .mobile-section { margin-bottom: 24px; }
      .mobile-section-title { font-size: 14px; font-weight: 700; color: var(--gray-500); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
      .mobile-section-link { font-size: 13px; color: var(--blue-500); font-weight: 600; }
      
      .mobile-card { background: var(--white); border-radius: var(--radius-sm); padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border-left: 4px solid transparent; }
      .mobile-card.verde { border-left-color: var(--emerald-500); }
      .mobile-card.arancione { border-left-color: var(--amber-500); }
      .mobile-card.rosso { border-left-color: var(--red-500); }
      
      .mobile-modal { position: fixed; inset: 0; background: var(--white); z-index: 300; display: flex; flex-direction: column; }
      .mobile-modal-header { padding: 16px 20px; padding-top: calc(16px + var(--safe-top)); border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; }
      .mobile-modal-body { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: calc(100px + var(--safe-bottom)); }
      .mobile-modal-footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 20px; padding-bottom: calc(16px + var(--safe-bottom)); background: var(--white); border-top: 1px solid var(--gray-100); }
    }
    
    @media (min-width: 901px) {
      .app-mobile { display: none; }
    }
    
    /* ============ LOADING ============ */
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; }
    .spinner { width: 40px; height: 40px; border: 4px solid var(--gray-200); border-top-color: var(--blue-500); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

// ============ CONFIG ============
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxLjRAr6wRA-aQA-7zWh6PU8IE9q5rw0Ish6xNCodApYecJx1JDMWlWn9oGtli5uFqleQ/exec';
const STAGES = ['Lead', 'Contattato', 'Demo', 'Proposta', 'Chiuso', 'Perso'];
const STAGE_COLORS = { Lead: 'blue', Contattato: 'purple', Demo: 'amber', Proposta: 'pink', Chiuso: 'emerald', Perso: 'red' };
const ACTIVE_KEY = 'hcs_active_hotels';

// ============ UTILS ============
function getSemaforo(h) {
  if (!h.dataRicontatto) return 'verde';
  const oggi = new Date(); oggi.setHours(0,0,0,0);
  const ric = new Date(h.dataRicontatto);
  const diff = Math.ceil((ric - oggi) / 86400000);
  if (diff < 0) return 'rosso';
  if (diff <= 3) return 'arancione';
  return 'verde';
}

function getDistance(lat1, lng1, lat2, lng2) {
  if (!lat1 || !lng1 || !lat2 || !lng2) return null;
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDist(km) {
  if (km === null) return '';
  return km < 1 ? `${Math.round(km*1000)}m` : `${km.toFixed(1)}km`;
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('it-IT', { day: 'numeric', month: 'short' });
}

function App() {
  const [archivio, setArchivio] = useState([]);
  const [attivi, setAttivi] = useState([]);
  const [loading, setLoading] = useState(true);
  const [source, setSource] = useState('');
  const [userPos, setUserPos] = useState(null);
  
  // Desktop state
  const [activeNav, setActiveNav] = useState('dashboard');
  const [activeView, setActiveView] = useState('kanban');
  const [search, setSearch] = useState('');
  const [selectedHotel, setSelectedHotel] = useState(null);
  
  // Mobile state
  const [mobilePage, setMobilePage] = useState('home');
  const [mobileHotel, setMobileHotel] = useState(null);
  const [nearbyOrigin, setNearbyOrigin] = useState(null); // { lat, lng, name } or null for GPS

  useEffect(() => {
    loadData();
    navigator.geolocation?.getCurrentPosition(
      p => setUserPos({ lat: p.coords.latitude, lng: p.coords.longitude }),
      () => {},
      { enableHighAccuracy: true }
    );
  }, []);

  async function loadData() {
    setLoading(true);
    const saved = JSON.parse(localStorage.getItem(ACTIVE_KEY) || '[]');
    try {
      const res = await fetch(SHEETS_URL);
      const json = await res.json();
      if (json.success && json.data) {
        const hotels = json.data.map(h => ({
          nome: h['Nome'] || '', categoria: h['Categoria'] || '', citta: h['Città'] || '',
          provincia: h['Provincia'] || '', indirizzo: h['Indirizzo'] || '', telefono: h['Telefono'] || '',
          sito: h['Sito Web'] || '', rating: h['Rating'] || '', recensioni: h['N° Recensioni'] || '',
          placeId: h['Place ID Google'] || '', urlMaps: h['URL Maps'] || '',
          stage: h['Stage CRM'] || '', valore: Number(h['Valore Stimato €']) || 0,
          referente: h['Referente'] || '', ultimoContatto: h['Ultimo Contatto'] || '',
          dataRicontatto: h['Data Ricontatto'] || '', note: h['Note'] || '',
          lat: Number(h['Lat']) || null, lng: Number(h['Lng']) || null
        })).filter(h => h.nome);
        setArchivio(hotels);
        const active = hotels.filter(h => saved.includes(h.nome) || (h.ultimoContatto && h.stage !== 'Lead'));
        setAttivi(active);
        setSource('sheets');
      }
    } catch (e) { console.error(e); setSource('error'); }
    setLoading(false);
  }

  function addToActive(hotel) {
    const newHotel = { ...hotel, stage: 'Lead', ultimoContatto: new Date().toISOString().split('T')[0] };
    const newAttivi = [...attivi, newHotel];
    setAttivi(newAttivi);
    localStorage.setItem(ACTIVE_KEY, JSON.stringify(newAttivi.map(h => h.nome)));
    saveToSheets(hotel.nome, { stage: 'Lead', ultimoContatto: newHotel.ultimoContatto });
  }

  function saveHotel(updated) {
    const newAttivi = attivi.map(h => h.nome === updated.nome ? updated : h);
    if (!attivi.find(h => h.nome === updated.nome)) newAttivi.push(updated);
    setAttivi(newAttivi);
    localStorage.setItem(ACTIVE_KEY, JSON.stringify(newAttivi.map(h => h.nome)));
    saveToSheets(updated.nome, {
      stage: updated.stage, referente: updated.referente,
      dataRicontatto: updated.dataRicontatto, valore: updated.valore,
      ultimoContatto: new Date().toISOString().split('T')[0], note: updated.note
    });
    setSelectedHotel(null);
    setMobileHotel(null);
  }

  async function saveToSheets(nome, fields) {
    try {
      await fetch(SHEETS_URL, { method: 'POST', body: JSON.stringify({ action: 'update', nome, fields }) });
    } catch (e) { console.error(e); }
  }

  // Stats
  const stats = useMemo(() => {
    const verde = attivi.filter(h => getSemaforo(h) === 'verde').length;
    const arancione = attivi.filter(h => getSemaforo(h) === 'arancione').length;
    const rosso = attivi.filter(h => getSemaforo(h) === 'rosso').length;
    const pipeline = attivi.filter(h => !['Chiuso','Perso'].includes(h.stage)).reduce((s,h) => s + (h.valore||0), 0);
    return { totale: attivi.length, verde, arancione, rosso, pipeline };
  }, [attivi]);

  // Kanban groups
  const kanbanData = useMemo(() => {
    const g = {}; STAGES.forEach(s => g[s] = []);
    attivi.forEach(h => { const st = h.stage || 'Lead'; if (g[st]) g[st].push(h); });
    return g;
  }, [attivi]);

  // Filtered archive
  const filteredArchive = useMemo(() => {
    if (search.length < 2) return [];
    const q = search.toLowerCase();
    return archivio.filter(h => !attivi.find(a => a.nome === h.nome))
      .filter(h => h.nome.toLowerCase().includes(q) || h.citta.toLowerCase().includes(q))
      .slice(0, 50);
  }, [archivio, attivi, search]);

  // Nearby hotels
  const getNearbyHotels = useCallback((originLat, originLng, excludeName = null) => {
    return archivio
      .filter(h => h.lat && h.lng && h.nome !== excludeName)
      .map(h => ({ ...h, dist: getDistance(originLat, originLng, h.lat, h.lng) }))
      .filter(h => h.dist !== null)
      .sort((a, b) => a.dist - b.dist)
      .slice(0, 20);
  }, [archivio]);

  const closestHotel = useMemo(() => {
    if (!userPos) return null;
    const nearby = getNearbyHotels(userPos.lat, userPos.lng);
    return nearby[0] || null;

            </div>

                <span className="nav-icon">📁</span> Archivio

              <div className={`nav-item ${activeNav === 'nearby' ? 'active' : ''}`} onClick={() => setActiveNav('nearby')}>

          </nav>
          <div className="sidebar-footer">

                <div className="stat-card emerald"><div className="stat-value">{stats.verde}</div><div className="stat-label">OK</div></div>
                <div className="stat-card amber"><div className="stat-value">{stats.arancione}</div><div className="stat-label">Presto</div></div>
                <div className="stat-card red"><div className="stat-value">{stats.rosso}</div><div className="stat-label">Scaduti</div></div>
                <div className="stat-card purple"><div className="stat-value">€{(stats.pipeline/1000).toFixed(0)}k</div><div className="stat-label">Pipeline</div></div>
              </div>
              <div className="content-area">
                {attivi.length === 0 ? (
                  <div className="empty-state">
                    <div className="empty-icon">🏨</div>
                    <div className="empty-title">Nessun hotel attivo</div>

                    <button className="btn btn-primary" onClick={() => setActiveNav('archivio')}>📁 Vai all'Archivio</button>
                  </div>
                ) : activeView === 'kanban' ? (
                  <div className="kanban">
                    {STAGES.map(stage => (
                      <div key={stage} className="kanban-col">
                        <div className={`kanban-header ${stage.toLowerCase()}`}>
                          <span className="kanban-title">{stage}</span>

                              </div>
                            </div>

                        </div>
                      </div>

                  </div>
                ) : activeView === 'lista' ? (
                  <div className="list-view">
                    {attivi.map(h => (

                        <div className={`semaforo ${getSemaforo(h)}`}></div>
                        <div className="list-card-info">
                          <div className="list-card-name">{h.nome}</div>
                          <div className="list-card-meta">📍 {h.citta} • {h.categoria} • {h.stage || 'Lead'}</div>

                        <div className="card-tags">

                          {h.dataRicontatto && <span className="tag date">📅 {formatDate(h.dataRicontatto)}</span>}

                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="map-container">
                    <div className="map-placeholder">
                      <div className="map-placeholder-icon">🗺️</div>
                      <h3>Mappa Hotel</h3>
                      <p>Clicca per aprire la mappa con tutti gli hotel attivi</p>
                      <button className="btn btn-primary" onClick={() => {

                        if (coords) window.open(`https://www.google.com/maps/dir/${coords}`, '_blank');
                      }}>🗺️ Apri Google Maps</button>
                    </div>

                )}
              </div>
            </>
          )}

          {activeNav === 'archivio' && (
            <>
              <div className="header">
                <h1 className="header-title">Archivio</h1>
                <div className="search-box">

                    <div className="empty-icon">🤷</div>
                    <div className="empty-title">Nessun risultato</div>
                    <div className="empty-text">Prova con un altro termine.</div>
                  </div>
                ) : (
                  <div className="archive-grid">
                    {filteredArchive.map(h => (
                      <div key={h.nome} className="archive-card">
                        <div className="archive-info">
                          <div className="archive-name">{h.nome}</div>
                          <div className="archive-meta">📍 {h.citta} • {h.categoria}{h.rating && ` • ⭐${h.rating}`}</div>
                        </div>
                        <button className="btn btn-success" onClick={() => { addToActive(h); setActiveNav('dashboard'); }}>+ Lead</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </>
          )}

          {activeNav === 'nearby' && (
            <>
              <div className="header">
                <h1 className="header-title">Hotel Vicini</h1>
              </div>
              <div className="content-area">
                {!userPos ? (
                  <div className="empty-state">
                    <div className="empty-icon">📍</div>
                    <div className="empty-title">GPS non disponibile</div>
                    <div className="empty-text">Attiva la localizzazione per vedere gli hotel vicini.</div>

                ) : (
                  <div className="list-view">
                    {getNearbyHotels(userPos.lat, userPos.lng).map(h => (
                      <div key={h.nome} className="list-card" onClick={() => setSelectedHotel(h)}>
                        <div className="list-card-info">
                          <div className="list-card-name">{h.nome}</div>
                          <div className="list-card-meta">📍 {h.citta} • {h.categoria}</div>

                        <span className="tag dist">📍 {formatDist(h.dist)}</span>
                        <button className="btn btn-secondary btn-icon" onClick={e => { e.stopPropagation(); window.open(h.urlMaps || `https://www.google.com/maps/dir/?api=1&destination=${h.lat},${h.lng}`, '_blank'); }}>🗺️</button>

                  <div className="card-name">{h.nome}</div>
                  <div className="card-location">📍 {h.citta} • {h.stage || 'Lead'}</div>
                  <div className="card-tags" style={{marginTop:8}}>

                  </div>

            <div className={`mobile-nav-item ${mobilePage === 'archivio' ? 'active' : ''}`} onClick={() => setMobilePage('archivio')}>
              <span className="mobile-nav-icon">📁</span>
              <span className="mobile-nav-label">Archivio</span>
            </div>
            <div className={`mobile-nav-item ${mobilePage === 'list' ? 'active' : ''}`} onClick={() => setMobilePage('list')}>
              <span className="mobile-nav-icon">📋</span>
              <span className="mobile-nav-label">Lista</span>
            </div>
          </nav>
        )}
      </div>
    </div>
  );
}

// ============ HOTEL MODAL (DESKTOP) ============
function HotelModal({ hotel, archivio, userPos, onClose, onSave, getNearbyHotels }) {
  const [form, setForm] = useState({
    stage: hotel.stage || 'Lead',
    referente: hotel.referente || '',
    dataRicontatto: hotel.dataRicontatto || '',
    valore: hotel.valore || '',
    note: hotel.note || ''
  });

  const nearbyHotels = useMemo(() => {
    if (!hotel.lat || !hotel.lng) return [];
    return getNearbyHotels(hotel.lat, hotel.lng, hotel.nome).slice(0, 5);
  }, [hotel, getNearbyHotels]);

  const handleSave = () => {
    onSave({ ...hotel, ...form, valore: Number(form.valore) || 0 });
  };

  const openMaps = () => {
    window.open(hotel.urlMaps || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(hotel.nome + ' ' + hotel.citta)}`, '_blank');
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <div>
            <div className="modal-title">{hotel.nome}</div>
            <div className="modal-subtitle">📍 {hotel.citta} • {hotel.categoria}</div>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="quick-actions">
            <div className="quick-action" onClick={() => hotel.telefono && (window.location.href = `tel:${hotel.telefono}`)}>
              <span className="quick-action-icon">📞</span>
              <span className="quick-action-label">Chiama</span>
            </div>
            <div className="quick-action" onClick={openMaps}>
              <span className="quick-action-icon">🗺️</span>
              <span className="quick-action-label">Naviga</span>
            </div>
            <div className="quick-action" onClick={() => hotel.sito && window.open(hotel.sito, '_blank')}>
              <span className="quick-action-icon">🌐</span>
              <span className="quick-action-label">Sito</span>
            </div>
            <div className="quick-action" onClick={() => {
              if (nearbyHotels.length === 0) return;
              const waypoints = nearbyHotels.slice(0, 4).map(h => `${h.lat},${h.lng}`).join('|');
              const dest = nearbyHotels[Math.min(4, nearbyHotels.length - 1)];
              window.open(`https://www.google.com/maps/dir/?api=1&origin=${hotel.lat},${hotel.lng}&destination=${dest.lat},${dest.lng}&waypoints=${waypoints}&travelmode=driving`, '_blank');
            }}>
              <span className="quick-action-icon">🛣️</span>
              <span className="quick-action-label">Giro</span>
            </div>
          </div>

          <div className="form-group">
            <label className="form-label">Stage</label>
            <div className="stage-grid">
              {STAGES.map(s => (
                <div key={s} className={`stage-opt ${form.stage === s ? 'active' : ''}`} onClick={() => setForm({...form, stage: s})}>{s}</div>
              ))}
            </div>
          </div>

          <div className="form-group">
            <label className="form-label">Referente</label>
            <input className="form-input" placeholder="Nome referente" value={form.referente} onChange={e => setForm({...form, referente: e.target.value})} />
          </div>

          <div style={{display:'flex',gap:16}}>
            <div className="form-group" style={{flex:1}}>
              <label className="form-label">Data Ricontatto</label>
              <input className="form-input" type="date" value={form.dataRicontatto} onChange={e => setForm({...form, dataRicontatto: e.target.value})} />
            </div>
            <div className="form-group" style={{flex:1}}>
              <label className="form-label">Valore €</label>
              <input className="form-input" type="number" placeholder="0" value={form.valore} onChange={e => setForm({...form, valore: e.target.value})} />
            </div>
          </div>

          <div className="form-group">
            <label className="form-label">Note</label>
            <textarea className="form-input" placeholder="Note..." value={form.note} onChange={e => setForm({...form, note: e.target.value})} />
          </div>

          {nearbyHotels.length > 0 && (
            <div className="nearby-section">
              <div className="nearby-title">📍 Strutture Vicine</div>
              <div className="nearby-list">
                {nearbyHotels.map(h => (
                  <div key={h.nome} className="nearby-item" onClick={() => window.open(`https://www.google.com/maps/dir/?api=1&origin=${hotel.lat},${hotel.lng}&destination=${h.lat},${h.lng}&travelmode=driving`, '_blank')}>
                    <span className="nearby-dist">{formatDist(h.dist)}</span>
                    <span className="nearby-name">{h.nome}</span>
                    <span className="nearby-arrow">→</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Annulla</button>
          <button className="btn btn-primary" onClick={handleSave}>💾 Salva</button>
        </div>
      </div>
    </div>
  );
}

// ============ MOBILE DETAIL ============
function MobileDetail({ hotel, archivio, userPos, onBack, onSave, onNearby, getNearbyHotels }) {
  const [form, setForm] = useState({
    stage: hotel.stage || 'Lead',
    referente: hotel.referente || '',
    dataRicontatto: hotel.dataRicontatto || '',
    valore: hotel.valore || '',
    note: hotel.note || ''
  });

  const handleSave = () => {
    onSave({ ...hotel, ...form, valore: Number(form.valore) || 0 });
    onBack();
  };

  const openMaps = () => {
    window.open(hotel.urlMaps || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(hotel.nome + ' ' + hotel.citta)}`, '_blank');
  };

  return (
    <div className="mobile-modal">
      <div className="mobile-modal-header">
        <button className="mobile-header-back" onClick={onBack}>←</button>
        <div style={{flex:1,textAlign:'center'}}>
          <div style={{fontWeight:700}}>{hotel.nome}</div>
          <div style={{fontSize:12,color:'var(--gray-500)'}}>📍 {hotel.citta}</div>
        </div>
        <div style={{width:40}}></div>
      </div>
      <div className="mobile-modal-body">
        <div className="quick-actions" style={{marginBottom:24}}>
          <div className="quick-action" onClick={() => hotel.telefono && (window.location.href = `tel:${hotel.telefono}`)}>
            <span className="quick-action-icon">📞</span>
            <span className="quick-action-label">Chiama</span>
          </div>
          <div className="quick-action" onClick={openMaps}>
            <span className="quick-action-icon">🗺️</span>
            <span className="quick-action-label">Naviga</span>
          </div>
          <div className="quick-action" onClick={() => onNearby(hotel.lat && hotel.lng ? { lat: hotel.lat, lng: hotel.lng, name: hotel.nome } : null)}>
            <span className="quick-action-icon">📍</span>
            <span className="quick-action-label">Vicini</span>
          </div>
          <div className="quick-action" onClick={() => hotel.sito && window.open(hotel.sito, '_blank')}>
            <span className="quick-action-icon">🌐</span>
            <span className="quick-action-label">Sito</span>
          </div>
        </div>

        <div className="form-group">
          <label className="form-label">Stage</label>
          <div className="stage-grid">
            {STAGES.map(s => (
              <div key={s} className={`stage-opt ${form.stage === s ? 'active' : ''}`} onClick={() => setForm({...form, stage: s})}>{s}</div>
            ))}
          </div>
        </div>

        <div className="form-group">
          <label className="form-label">Referente</label>
          <input className="form-input" placeholder="Nome referente" value={form.referente} onChange={e => setForm({...form, referente: e.target.value})} />
        </div>

        <div className="form-group">
          <label className="form-label">Data Ricontatto</label>
          <input className="form-input" type="date" value={form.dataRicontatto} onChange={e => setForm({...form, dataRicontatto: e.target.value})} />
        </div>

        <div className="form-group">
          <label className="form-label">Valore €</label>
          <input className="form-input" type="number" placeholder="0" value={form.valore} onChange={e => setForm({...form, valore: e.target.value})} />
        </div>

        <div className="form-group">
          <label className="form-label">Note</label>
          <textarea className="form-input" placeholder="Note..." value={form.note} onChange={e => setForm({...form, note: e.target.value})} />
        </div>
      </div>
      <div className="mobile-modal-footer">
        <button className="btn btn-primary" style={{width:'100%'}} onClick={handleSave}>💾 Salva Modifiche</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
