<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HCS CRM">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>HCS CRM Mobile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg-primary: #0d0d14;
      --bg-secondary: #1a1a2e;
      --bg-card: #252540;
      --bg-elevated: #2d2d4a;
      --text-primary: #ffffff;
      --text-secondary: #a0a0b8;
      --text-muted: #6b6b80;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --green: #22c55e;
      --green-bg: rgba(34, 197, 94, 0.15);
      --orange: #f59e0b;
      --orange-bg: rgba(245, 158, 11, 0.15);
      --red: #ef4444;
      --red-bg: rgba(239, 68, 68, 0.15);
      --blue: #3b82f6;
      --blue-bg: rgba(59, 130, 246, 0.15);
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      --radius: 16px;
      --radius-sm: 10px;
      --safe-top: env(safe-area-inset-top, 20px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body, #root {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overscroll-behavior: none;
    }

    .app {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding-top: var(--safe-top);
      padding-bottom: calc(80px + var(--safe-bottom));
    }

    /* Header */
    .header {
      padding: 16px 20px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .header-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header-title span {
      color: var(--accent);
    }

    .header-stats {
      display: flex;
      gap: 16px;
      font-size: 12px;
      font-weight: 600;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* Search Bar */
    .search-container {
      padding: 12px 20px;
      background: var(--bg-secondary);
    }

    .search-bar {
      display: flex;
      align-items: center;
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 14px 16px;
      gap: 12px;
      border: 1px solid var(--border);
    }

    .search-bar input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
    }

    .search-bar input::placeholder {
      color: var(--text-muted);
    }

    .search-icon {
      color: var(--text-muted);
      font-size: 18px;
    }

    /* Stage Filter Pills */
    .filter-container {
      padding: 8px 20px 12px;
      background: var(--bg-secondary);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .filter-container::-webkit-scrollbar {
      display: none;
    }

    .filter-pills {
      display: flex;
      gap: 8px;
      width: max-content;
    }

    .filter-pill {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      background: var(--bg-card);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .filter-pill.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .filter-pill .count {
      margin-left: 6px;
      opacity: 0.7;
    }

    /* Hotel List */
    .hotel-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .hotel-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }

    .hotel-card:active {
      transform: scale(0.98);
    }

    .hotel-card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .semaforo {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
      box-shadow: 0 0 8px currentColor;
    }

    .semaforo.verde { background: var(--green); color: var(--green); }
    .semaforo.arancione { background: var(--orange); color: var(--orange); }
    .semaforo.rosso { background: var(--red); color: var(--red); }

    .hotel-info {
      flex: 1;
      min-width: 0;
    }

    .hotel-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .hotel-location {
      font-size: 13px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .hotel-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .meta-tag {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .meta-tag.stage {
      background: var(--blue-bg);
      color: var(--blue);
    }

    .meta-tag.distance {
      background: var(--bg-elevated);
      color: var(--text-secondary);
    }

    .meta-tag.rating {
      background: var(--orange-bg);
      color: var(--orange);
    }

    .hotel-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .action-btn {
      flex: 1;
      padding: 12px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.15s;
    }

    .action-btn:active {
      transform: scale(0.96);
    }

    .action-btn.primary {
      background: var(--accent);
      color: white;
    }

    .action-btn.secondary {
      background: var(--bg-elevated);
      color: var(--text-primary);
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 8px 20px;
      padding-bottom: calc(8px + var(--safe-bottom));
      display: flex;
      justify-content: space-around;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-muted);
    }

    .nav-item.active {
      color: var(--accent);
    }

    .nav-item:active {
      transform: scale(0.95);
    }

    .nav-icon {
      font-size: 24px;
    }

    .nav-label {
      font-size: 11px;
      font-weight: 600;
    }

    /* Modal Detail */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      animation: fadeIn 0.2s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      width: 100%;
      max-height: 90vh;
      background: var(--bg-secondary);
      border-radius: 24px 24px 0 0;
      overflow: hidden;
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--text-muted);
      border-radius: 2px;
      margin: 12px auto;
    }

    .modal-header {
      padding: 0 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
    }

    .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg-card);
      border: none;
      color: var(--text-primary);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-body {
      padding: 0 20px 20px;
      max-height: calc(90vh - 100px);
      overflow-y: auto;
      padding-bottom: calc(20px + var(--safe-bottom));
    }

    /* Form Fields */
    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      border-color: var(--accent);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    textarea.form-input {
      min-height: 100px;
      resize: vertical;
    }

    /* Stage Selector */
    .stage-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stage-option {
      padding: 12px 8px;
      border-radius: var(--radius-sm);
      background: var(--bg-card);
      border: 2px solid var(--border);
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 12px;
      font-weight: 600;
    }

    .stage-option.selected {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.15);
    }

    .stage-option:active {
      transform: scale(0.96);
    }

    /* Quick Actions in Modal */
    .quick-actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .quick-action {
      padding: 16px;
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .quick-action:active {
      transform: scale(0.96);
      background: var(--bg-elevated);
    }

    .quick-action-icon {
      font-size: 28px;
    }

    .quick-action-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    /* Nearby Section */
    .nearby-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .nearby-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nearby-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nearby-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      cursor: pointer;
    }

    .nearby-item:active {
      background: var(--bg-elevated);
    }

    .nearby-distance {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      min-width: 50px;
    }

    .nearby-name {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
    }

    .nearby-arrow {
      color: var(--text-muted);
    }

    /* Empty State */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .empty-text {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .empty-btn {
      padding: 14px 28px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* GPS Banner */
    .gps-banner {
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }

    .gps-banner:active {
      opacity: 0.9;
    }

    .gps-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .gps-icon {
      font-size: 20px;
    }

    .gps-text {
      font-size: 13px;
      font-weight: 600;
    }

    .gps-arrow {
      font-size: 18px;
    }

    /* Save Button Fixed */
    .save-btn-fixed {
      position: sticky;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 20px;
      padding-bottom: calc(16px + var(--safe-bottom));
      background: linear-gradient(transparent, var(--bg-secondary) 20%);
    }

    .save-btn {
      width: 100%;
      padding: 16px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .save-btn:active {
      transform: scale(0.98);
    }

    .save-btn.saving {
      background: var(--text-muted);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // Stages configuration
    const STAGES = [
      { id: 'lead', label: 'Lead', color: '#3b82f6' },
      { id: 'contattato', label: 'Contattato', color: '#8b5cf6' },
      { id: 'demo', label: 'Demo', color: '#f59e0b' },
      { id: 'proposta', label: 'Proposta', color: '#ec4899' },
      { id: 'chiuso', label: 'Chiuso', color: '#22c55e' },
      { id: 'perso', label: 'Perso', color: '#ef4444' }
    ];

    // Demo data (will be replaced by real data from Google Sheets)
    const DEMO_HOTELS = [
      { id: 1, nome: 'Hotel Principe di Savoia', citta: 'Milano', indirizzo: 'Piazza della Repubblica 17', categoria: 'Hotel 5 stelle', stage: 'demo', rating: 4.6, telefono: '+39 02 62301', sito: 'https://www.dorchestercollection.com', placeId: 'ChIJrTLr-GyuEmsRBfy61i59si0', lat: 45.4818, lng: 9.1981, dataRicontatto: '2026-04-15', note: 'Interessati al sistema camere', valore: 45000, referente: 'Marco Rossi' },
      { id: 2, nome: 'RSA Villa Serena', citta: 'Bergamo', indirizzo: 'Via Borgo Palazzo 130', categoria: 'Casa di riposo', stage: 'contattato', rating: 4.2, telefono: '+39 035 123456', placeId: 'ChIJ2eUgeAK6hkcRPOrgNDH8xYc', lat: 45.6983, lng: 9.6773, dataRicontatto: '2026-04-12', note: 'Richiesta preventivo entro settimana', valore: 28000, referente: 'Dr.ssa Bianchi' },
      { id: 3, nome: 'Grand Hotel Tremezzo', citta: 'Tremezzina', indirizzo: 'Via Regina 8', categoria: 'Hotel 5 stelle', stage: 'proposta', rating: 4.8, telefono: '+39 0344 42491', sito: 'https://www.grandhoteltremezzo.com', placeId: 'ChIJN1t_tDeuEmsRUsoyG83frY4', lat: 45.9875, lng: 9.2264, dataRicontatto: '2026-04-18', note: 'Proposta inviata, attendo conferma budget', valore: 85000, referente: 'Valentina Corti' },
      { id: 4, nome: 'Hotel Excelsior', citta: 'Brescia', indirizzo: 'Via Gramsci 15', categoria: 'Hotel 4 stelle', stage: 'lead', rating: 4.3, telefono: '+39 030 45678', lat: 45.5416, lng: 10.2118, dataRicontatto: null, note: '', valore: 0 },
      { id: 5, nome: 'Residenza Universitaria Campus', citta: 'Pavia', indirizzo: 'Viale Golgi 25', categoria: 'Studentato', stage: 'lead', rating: 4.0, telefono: '+39 0382 987654', lat: 45.1847, lng: 9.1582, dataRicontatto: null, note: '', valore: 0 },
      { id: 6, nome: 'Casa di Cura San Pio', citta: 'Monza', indirizzo: 'Via Italia 50', categoria: 'Casa di cura', stage: 'chiuso', rating: 4.5, telefono: '+39 039 321654', lat: 45.5845, lng: 9.2744, dataRicontatto: null, note: 'Contratto firmato!', valore: 52000, referente: 'Ing. Fumagalli' }
    ];

    // Calculate semaforo status
    function getSemaforo(hotel) {
      if (!hotel.dataRicontatto && !hotel.dataInserimento) return 'verde';
      
      const oggi = new Date();
      oggi.setHours(0, 0, 0, 0);
      
      if (hotel.dataRicontatto) {
        const ricontatto = new Date(hotel.dataRicontatto);
        ricontatto.setHours(0, 0, 0, 0);
        const diffDays = Math.ceil((ricontatto - oggi) / (1000 * 60 * 60 * 24));
        
        if (diffDays < 0) return 'rosso';
        if (diffDays <= 3) return 'arancione';
        return 'verde';
      }
      
      // Auto 15 days logic
      const inserimento = new Date(hotel.dataInserimento || Date.now());
      const diffDays = Math.ceil((oggi - inserimento) / (1000 * 60 * 60 * 24));
      
      if (diffDays > 15) return 'rosso';
      if (diffDays > 7) return 'arancione';
      return 'verde';
    }

    // Calculate distance between two points (Haversine)
    function getDistance(lat1, lon1, lat2, lon2) {
      if (!lat1 || !lon1 || !lat2 || !lon2) return null;
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    // Format distance
    function formatDistance(km) {
      if (km === null) return '—';
      if (km < 1) return `${Math.round(km * 1000)}m`;
      return `${km.toFixed(1)}km`;
    }

    // Hotel Card Component
    function HotelCard({ hotel, userLat, userLng, onSelect }) {
      const semaforo = getSemaforo(hotel);
      const distance = getDistance(userLat, userLng, hotel.lat, hotel.lng);
      const stageInfo = STAGES.find(s => s.id === hotel.stage);

      const openMaps = (e) => {
        e.stopPropagation();
        const url = hotel.placeId 
          ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(hotel.nome)}&query_place_id=${hotel.placeId}`
          : `https://www.google.com/maps/dir/?api=1&destination=${hotel.lat},${hotel.lng}`;
        window.open(url, '_blank');
      };

      const callHotel = (e) => {
        e.stopPropagation();
        if (hotel.telefono) {
          window.location.href = `tel:${hotel.telefono}`;
        }
      };

      return (
        <div className="hotel-card" onClick={() => onSelect(hotel)}>
          <div className="hotel-card-header">
            <div className={`semaforo ${semaforo}`}></div>
            <div className="hotel-info">
              <div className="hotel-name">{hotel.nome}</div>
              <div className="hotel-location">
                📍 {hotel.citta} — {hotel.indirizzo}
              </div>
            </div>
          </div>
          
          <div className="hotel-meta">
            <span className="meta-tag stage" style={{ background: `${stageInfo?.color}20`, color: stageInfo?.color }}>
              {stageInfo?.label || hotel.stage}
            </span>
            {distance !== null && (
              <span className="meta-tag distance">📍 {formatDistance(distance)}</span>
            )}
            {hotel.rating && (
              <span className="meta-tag rating">⭐ {hotel.rating}</span>
            )}
            {hotel.dataRicontatto && (
              <span className="meta-tag" style={{ background: semaforo === 'rosso' ? 'var(--red-bg)' : semaforo === 'arancione' ? 'var(--orange-bg)' : 'var(--green-bg)', color: semaforo === 'rosso' ? 'var(--red)' : semaforo === 'arancione' ? 'var(--orange)' : 'var(--green)' }}>
                📅 {new Date(hotel.dataRicontatto).toLocaleDateString('it-IT', { day: 'numeric', month: 'short' })}
              </span>
            )}
          </div>

          <div className="hotel-actions">
            <button className="action-btn secondary" onClick={callHotel}>
              📞 Chiama
            </button>
            <button className="action-btn primary" onClick={openMaps}>
              🗺️ Naviga
            </button>
          </div>
        </div>
      );
    }

    // Detail Modal Component
    function DetailModal({ hotel, hotels, userLat, userLng, onClose, onSave }) {
      const [formData, setFormData] = useState({
        stage: hotel.stage || 'lead',
        note: hotel.note || '',
        dataRicontatto: hotel.dataRicontatto || '',
        valore: hotel.valore || '',
        referente: hotel.referente || ''
      });
      const [saving, setSaving] = useState(false);

      // Get nearby hotels
      const nearbyHotels = useMemo(() => {
        if (!hotel.lat || !hotel.lng) return [];
        return hotels
          .filter(h => h.id !== hotel.id && h.lat && h.lng)
          .map(h => ({
            ...h,
            distance: getDistance(hotel.lat, hotel.lng, h.lat, h.lng)
          }))
          .filter(h => h.distance !== null)
          .sort((a, b) => a.distance - b.distance)
          .slice(0, 5);
      }, [hotel, hotels]);

      const handleSave = async () => {
        setSaving(true);
        await new Promise(r => setTimeout(r, 500)); // Simulate save
        onSave({ ...hotel, ...formData, valore: Number(formData.valore) || 0 });
        setSaving(false);
      };

      const openMaps = () => {
        const url = hotel.placeId 
          ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(hotel.nome)}&query_place_id=${hotel.placeId}`
          : `https://www.google.com/maps/dir/?api=1&destination=${hotel.lat},${hotel.lng}`;
        window.open(url, '_blank');
      };

      const openWebsite = () => {
        if (hotel.sito) window.open(hotel.sito, '_blank');
      };

      const callHotel = () => {
        if (hotel.telefono) window.location.href = `tel:${hotel.telefono}`;
      };

      const openNearbyRoute = () => {
        if (nearbyHotels.length === 0) return;
        const waypoints = nearbyHotels.slice(0, 4).map(h => `${h.lat},${h.lng}`).join('|');
        const destination = nearbyHotels[nearbyHotels.length > 4 ? 4 : nearbyHotels.length - 1];
        const url = `https://www.google.com/maps/dir/?api=1&origin=${hotel.lat},${hotel.lng}&destination=${destination.lat},${destination.lng}&waypoints=${waypoints}&travelmode=driving`;
        window.open(url, '_blank');
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div className="modal-handle"></div>
            
            <div className="modal-header">
              <div className="modal-title">{hotel.nome}</div>
              <button className="modal-close" onClick={onClose}>✕</button>
            </div>

            <div className="modal-body">
              {/* Quick Actions */}
              <div className="quick-actions">
                <div className="quick-action" onClick={callHotel}>
                  <span className="quick-action-icon">📞</span>
                  <span className="quick-action-label">Chiama</span>
                </div>
                <div className="quick-action" onClick={openMaps}>
                  <span className="quick-action-icon">🗺️</span>
                  <span className="quick-action-label">Naviga</span>
                </div>
                <div className="quick-action" onClick={openWebsite}>
                  <span className="quick-action-icon">🌐</span>
                  <span className="quick-action-label">Sito Web</span>
                </div>
                <div className="quick-action" onClick={openNearbyRoute}>
                  <span className="quick-action-icon">🛣️</span>
                  <span className="quick-action-label">Giro Vicini</span>
                </div>
              </div>

              {/* Stage Selector */}
              <div className="form-group">
                <label className="form-label">Stage</label>
                <div className="stage-selector">
                  {STAGES.map(stage => (
                    <div 
                      key={stage.id}
                      className={`stage-option ${formData.stage === stage.id ? 'selected' : ''}`}
                      style={{ borderColor: formData.stage === stage.id ? stage.color : undefined }}
                      onClick={() => setFormData(f => ({ ...f, stage: stage.id }))}
                    >
                      {stage.label}
                    </div>
                  ))}
                </div>
              </div>

              {/* Form Fields */}
              <div className="form-group">
                <label className="form-label">Referente</label>
                <input 
                  type="text" 
                  className="form-input" 
                  placeholder="Nome del contatto"
                  value={formData.referente}
                  onChange={e => setFormData(f => ({ ...f, referente: e.target.value }))}
                />
              </div>

              <div className="form-group">
                <label className="form-label">Data Ricontatto</label>
                <input 
                  type="date" 
                  className="form-input"
                  value={formData.dataRicontatto}
                  onChange={e => setFormData(f => ({ ...f, dataRicontatto: e.target.value }))}
                />
              </div>

              <div className="form-group">
                <label className="form-label">Valore Pipeline (€)</label>
                <input 
                  type="number" 
                  className="form-input" 
                  placeholder="0"
                  value={formData.valore}
                  onChange={e => setFormData(f => ({ ...f, valore: e.target.value }))}
                />
              </div>

              <div className="form-group">
                <label className="form-label">Note</label>
                <textarea 
                  className="form-input" 
                  placeholder="Aggiungi note sulla visita..."
                  value={formData.note}
                  onChange={e => setFormData(f => ({ ...f, note: e.target.value }))}
                ></textarea>
              </div>

              {/* Nearby Hotels */}
              {nearbyHotels.length > 0 && (
                <div className="nearby-section">
                  <div className="nearby-title">
                    📍 Strutture Vicine
                  </div>
                  <div className="nearby-list">
                    {nearbyHotels.map(h => (
                      <div 
                        key={h.id} 
                        className="nearby-item"
                        onClick={() => {
                          const url = `https://www.google.com/maps/dir/?api=1&origin=${hotel.lat},${hotel.lng}&destination=${h.lat},${h.lng}&travelmode=driving`;
                          window.open(url, '_blank');
                        }}
                      >
                        <span className="nearby-distance">{formatDistance(h.distance)}</span>
                        <span className="nearby-name">{h.nome}</span>
                        <span className="nearby-arrow">→</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>

            <div className="save-btn-fixed">
              <button className={`save-btn ${saving ? 'saving' : ''}`} onClick={handleSave}>
                {saving ? '⏳ Salvataggio...' : '✓ Salva Modifiche'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // Main App Component
    function App() {
      const [hotels, setHotels] = useState(DEMO_HOTELS);
      const [search, setSearch] = useState('');
      const [activeFilter, setActiveFilter] = useState('all');
      const [selectedHotel, setSelectedHotel] = useState(null);
      const [activeTab, setActiveTab] = useState('list');
      const [userLat, setUserLat] = useState(45.4642); // Default: Milano
      const [userLng, setUserLng] = useState(9.1900);
      const [gpsStatus, setGpsStatus] = useState('idle'); // idle, loading, success, error
      const fileInputRef = useRef(null);

      // Request GPS
      useEffect(() => {
        if ('geolocation' in navigator) {
          setGpsStatus('loading');
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              setUserLat(pos.coords.latitude);
              setUserLng(pos.coords.longitude);
              setGpsStatus('success');
            },
            () => setGpsStatus('error'),
            { enableHighAccuracy: true, timeout: 10000 }
          );
        }
      }, []);

      // Filter hotels
      const filteredHotels = useMemo(() => {
        let result = hotels;
        
        // Search filter
        if (search) {
          const s = search.toLowerCase();
          result = result.filter(h => 
            h.nome?.toLowerCase().includes(s) ||
            h.citta?.toLowerCase().includes(s) ||
            h.indirizzo?.toLowerCase().includes(s)
          );
        }
        
        // Stage filter
        if (activeFilter !== 'all') {
          result = result.filter(h => h.stage === activeFilter);
        }
        
        // Sort by distance
        result = result
          .map(h => ({ ...h, distance: getDistance(userLat, userLng, h.lat, h.lng) }))
          .sort((a, b) => {
            if (a.distance === null) return 1;
            if (b.distance === null) return -1;
            return a.distance - b.distance;
          });
        
        return result;
      }, [hotels, search, activeFilter, userLat, userLng]);

      // Stats
      const stats = useMemo(() => ({
        total: hotels.length,
        rosso: hotels.filter(h => getSemaforo(h) === 'rosso').length,
        arancione: hotels.filter(h => getSemaforo(h) === 'arancione').length,
        verde: hotels.filter(h => getSemaforo(h) === 'verde').length
      }), [hotels]);

      // Stage counts
      const stageCounts = useMemo(() => {
        const counts = { all: hotels.length };
        STAGES.forEach(s => {
          counts[s.id] = hotels.filter(h => h.stage === s.id).length;
        });
        return counts;
      }, [hotels]);

      // Handle save
      const handleSave = (updatedHotel) => {
        setHotels(prev => prev.map(h => h.id === updatedHotel.id ? updatedHotel : h));
        setSelectedHotel(null);
      };

      // Handle file import
      const handleFileImport = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet);
            
            const imported = json.map((row, i) => ({
              id: Date.now() + i,
              nome: row['Nome'] || row['title'] || row['name'] || '',
              citta: row['Città'] || row['city'] || row['Comune'] || '',
              indirizzo: row['Indirizzo'] || row['street'] || row['address'] || '',
              categoria: row['Categoria'] || row['categoryName'] || '',
              telefono: row['Telefono'] || row['phone'] || '',
              sito: row['Sito Web'] || row['website'] || '',
              rating: parseFloat(row['Rating'] || row['totalScore']) || null,
              placeId: row['Place ID'] || '',
              lat: parseFloat(row['Lat'] || row['GPS_Lat']) || null,
              lng: parseFloat(row['Lng'] || row['GPS_Lng']) || null,
              stage: 'lead',
              dataInserimento: new Date().toISOString().split('T')[0],
              dataRicontatto: null,
              note: '',
              valore: 0,
              referente: ''
            })).filter(h => h.nome);
            
            setHotels(prev => [...imported, ...prev]);
            alert(`✅ Importate ${imported.length} strutture`);
          } catch (err) {
            alert('❌ Errore importazione file');
            console.error(err);
          }
        };
        reader.readAsArrayBuffer(file);
        e.target.value = '';
      };

      // Find closest hotel to current position
      const closestHotel = useMemo(() => {
        if (gpsStatus !== 'success') return null;
        return filteredHotels.find(h => h.distance !== null);
      }, [filteredHotels, gpsStatus]);

      return (
        <div className="app">
          {/* GPS Banner */}
          {gpsStatus === 'success' && closestHotel && (
            <div className="gps-banner" onClick={() => setSelectedHotel(closestHotel)}>
              <div className="gps-info">
                <span className="gps-icon">📍</span>
                <span className="gps-text">
                  Più vicino: {closestHotel.nome} ({formatDistance(closestHotel.distance)})
                </span>
              </div>
              <span className="gps-arrow">→</span>
            </div>
          )}

          {/* Header */}
          <div className="header">
            <div className="header-title">HCS <span>CRM</span></div>
            <div className="header-stats">
              <div className="stat">
                <div className="stat-dot" style={{ background: 'var(--red)' }}></div>
                {stats.rosso}
              </div>
              <div className="stat">
                <div className="stat-dot" style={{ background: 'var(--orange)' }}></div>
                {stats.arancione}
              </div>
              <div className="stat">
                <div className="stat-dot" style={{ background: 'var(--green)' }}></div>
                {stats.verde}
              </div>
            </div>
          </div>

          {/* Search */}
          <div className="search-container">
            <div className="search-bar">
              <span className="search-icon">🔍</span>
              <input 
                type="text"
                placeholder="Cerca hotel, città..."
                value={search}
                onChange={e => setSearch(e.target.value)}
              />
            </div>
          </div>

          {/* Filter Pills */}
          <div className="filter-container">
            <div className="filter-pills">
              <div 
                className={`filter-pill ${activeFilter === 'all' ? 'active' : ''}`}
                onClick={() => setActiveFilter('all')}
              >
                Tutti<span className="count">{stageCounts.all}</span>
              </div>
              {STAGES.map(stage => (
                <div 
                  key={stage.id}
                  className={`filter-pill ${activeFilter === stage.id ? 'active' : ''}`}
                  onClick={() => setActiveFilter(stage.id)}
                >
                  {stage.label}<span className="count">{stageCounts[stage.id]}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Hotel List */}
          <div className="hotel-list">
            {filteredHotels.length === 0 ? (
              <div className="empty-state">
                <div className="empty-icon">🏨</div>
                <div className="empty-title">Nessuna struttura</div>
                <div className="empty-text">Importa il database per iniziare</div>
                <button className="empty-btn" onClick={() => fileInputRef.current?.click()}>
                  📥 Importa XLSX
                </button>
              </div>
            ) : (
              filteredHotels.map(hotel => (
                <HotelCard 
                  key={hotel.id}
                  hotel={hotel}
                  userLat={userLat}
                  userLng={userLng}
                  onSelect={setSelectedHotel}
                />
              ))
            )}
          </div>

          {/* Hidden file input */}
          <input 
            type="file" 
            ref={fileInputRef}
            accept=".xlsx,.xls,.csv"
            style={{ display: 'none' }}
            onChange={handleFileImport}
          />

          {/* Bottom Navigation */}
          <div className="bottom-nav">
            <div className={`nav-item ${activeTab === 'list' ? 'active' : ''}`} onClick={() => setActiveTab('list')}>
              <span className="nav-icon">📋</span>
              <span className="nav-label">Lista</span>
            </div>
            <div className={`nav-item ${activeTab === 'nearby' ? 'active' : ''}`} onClick={() => setActiveTab('nearby')}>
              <span className="nav-icon">📍</span>
              <span className="nav-label">Vicini</span>
            </div>
            <div className="nav-item" onClick={() => fileInputRef.current?.click()}>
              <span className="nav-icon">📥</span>
              <span className="nav-label">Import</span>
            </div>
            <div className={`nav-item ${activeTab === 'stats' ? 'active' : ''}`} onClick={() => setActiveTab('stats')}>
              <span className="nav-icon">📊</span>
              <span className="nav-label">Stats</span>
            </div>
          </div>

          {/* Detail Modal */}
          {selectedHotel && (
            <DetailModal 
              hotel={selectedHotel}
              hotels={hotels}
              userLat={userLat}
              userLng={userLng}
              onClose={() => setSelectedHotel(null)}
              onSave={handleSave}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
