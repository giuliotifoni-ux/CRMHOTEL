<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <g transform="translate(100, 120)">
    <!-- Building icon -->
    <rect x="60" y="80" width="200" height="180" rx="8" fill="url(#accent)"/>
    <rect x="80" y="100" width="40" height="40" rx="4" fill="#0d0d14"/>
    <rect x="140" y="100" width="40" height="40" rx="4" fill="#0d0d14"/>
    <rect x="200" y="100" width="40" height="40" rx="4" fill="#0d0d14"/>
    <rect x="80" y="160" width="40" height="40" rx="4" fill="#0d0d14"/>
    <rect x="140" y="160" width="40" height="40" rx="4" fill="#0d0d14"/>
    <rect x="200" y="160" width="40" height="40" rx="4" fill="#0d0d14"/>
    <rect x="130" y="210" width="60" height="50" rx="4" fill="#0d0d14"/>
    <!-- Semaforo dots -->
    <circle cx="280" cy="40" r="20" fill="#22c55e"/>
    <circle cx="280" cy="90" r="20" fill="#f59e0b"/>
    <circle cx="280" cy="140" r="20" fill="#ef4444"/>
  </g>
  <text x="256" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="48" font-weight="700" fill="white">HCS</text>
  <text x="256" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="600" fill="#6366f1">CRM</text>
</svg>
